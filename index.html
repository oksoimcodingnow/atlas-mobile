<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#04070d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ATLAS" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<title>ATLAS</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="grid-bg"></div>

  <header class="header">
    <div class="brand">A · T · L · A · S</div>
    <div class="status"><span class="dot"></span>ONLINE</div>
  </header>

  <main class="chat-area" id="chatArea">
    <div class="empty" id="emptyState">
      <div class="ring">
        <div class="greet" id="greet">Good morning</div>
      </div>
      <div class="prompt">What are we building today<span class="blink">_</span></div>
      <div class="hint">Ask me to read, edit, or commit code in your GitHub repos.</div>
    </div>
  </main>

  <footer class="composer">
    <div class="repo-bar">
      <label>repo</label>
      <input type="text" id="repoInput" placeholder="owner/repo (e.g. oksoimcodingnow/roshop)" autocomplete="off" />
    </div>
    <div class="input-row">
      <textarea id="msgInput" rows="1" placeholder="Talk to ATLAS..." autocomplete="off"></textarea>
      <button id="sendBtn" class="send">▶</button>
    </div>
    <div class="model-bar" id="modelBar">
      <button class="pill active" data-model="claude-opus-4-7">OPUS 4.7</button>
      <button class="pill" data-model="claude-sonnet-4-6">SONNET</button>
      <button class="pill" data-model="claude-haiku-4-5">HAIKU</button>
    </div>
  </footer>

<script src="/app.js"></script>
</body>
</html>
